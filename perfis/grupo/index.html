<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grupo</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- <a href="#" class="voltar"> -->
        <a href="../../autenticacao/quem-e-voce/index.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="perfil">

        <div class="avatar">
            <i class="fa-solid fa-users"></i>
        </div>

        <div>
            <h2>GRUPO</h2>
            <span>Represento um grupo ou comunidade</span>
        </div>

    </div>

    <div class="banner">

        <i class="fa-solid fa-users"></i>

        <p>
            Organize uma campanha de doação
            com seu grupo ou comunidade.
        </p>

    </div>

    <h3>DADOS DO GRUPO</h3>

    <div class="campo">
        <i class="fa-solid fa-users"></i>
        <input type="text" placeholder="Nome do Grupo">
    </div>

    <div class="campo">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Nome do Responsável">
    </div>

    <div class="campo">
        <i class="fa-solid fa-phone"></i>
        <input type="text" placeholder="Telefone">
    </div>

    <div class="campo">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="E-mail">
    </div>

    <div class="campo">
        <i class="fa-solid fa-users-line"></i>
        <input type="number" placeholder="Quantidade de Participantes">
    </div>

    <div class="campo">
        <i class="fa-solid fa-location-dot"></i>
        <input type="text" placeholder="Cidade">
    </div>

    <h3>SOBRE A CAMPANHA</h3>

    <div class="campo">
        <i class="fa-solid fa-users"></i>
        <input type="number" placeholder="Número de participantes interessados">
    </div>

    <div class="campo">
        <i class="fa-solid fa-calendar-days"></i>
        <input type="date">
    </div>

    <div class="campo">
        <i class="fa-solid fa-map-location-dot"></i>
        <input type="text" placeholder="Local disponível">
    </div>

    <button id="btnGrupo">

        Solicitar Unidade Móvel

        <i class="fa-solid fa-arrow-right"></i>

    </button>

    <div class="info">

        <i class="fa-solid fa-circle-info"></i>

        Nossa equipe entrará em contato para
        confirmar os detalhes da sua campanha.

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
