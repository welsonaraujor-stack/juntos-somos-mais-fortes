<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pessoa</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- <a href="#" class="voltar"> -->
        <a href="../../autenticacao/quem-e-voce/index.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="perfil">

        <div class="avatar">
            <i class="fa-solid fa-user"></i>
        </div>

        <div>
            <h2>PESSOA</h2>
            <h3 id="nomeUsuario">
             Carregando...
            </h3>
            <span>Quero doar sangue</span>
        </div>

    </div>

    <div class="banner">

        <i class="fa-solid fa-heart-circle-plus"></i>

        <p>
            Junte-se a milhares de doadores
            e ajude a salvar vidas.
        </p>

    </div>

    <h3>SEUS DADOS</h3>

    <div class="campo">

        <i class="fa-solid fa-user"></i>

        <input
        type="text"
        placeholder="Nome Completo">

    </div>

    <div class="campo">

        <i class="fa-solid fa-id-card"></i>

        <input
        type="text"
        placeholder="CPF">

    </div>

    <div class="campo">

        <i class="fa-solid fa-calendar-days"></i>

        <input
        type="date">

    </div>

    <div class="campo">

        <i class="fa-solid fa-phone"></i>

        <input
        type="text"
        placeholder="Telefone">

    </div>

    <div class="campo">

        <i class="fa-solid fa-envelope"></i>

        <input
        type="email"
        placeholder="E-mail">

    </div>

    <div class="campo">

        <i class="fa-solid fa-location-dot"></i>

        <input
        type="text"
        placeholder="Cidade">

    </div>

    <div class="campo">

        <i class="fa-solid fa-droplet"></i>

        <select>

            <option>
                Tipo Sanguíneo (opcional)
            </option>

            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>AB+</option>
            <option>AB-</option>
            <option>O+</option>
            <option>O-</option>

        </select>

    </div>

    <div class="seguranca">

        <i class="fa-regular fa-shield-heart"></i>

        Seus dados estão seguros conosco.

    </div>

    <button id="btnTriagem">

        Iniciar Pré-Triagem

        <i class="fa-solid fa-arrow-right"></i>

    </button>

    <h3>FUNCIONALIDADES</h3>

    <div class="funcionalidades">

        <div class="card">
            <i class="fa-solid fa-droplet"></i>
            <span>Histórico de Doações</span>
        </div>

        <div class="card">
            <i class="fa-solid fa-wallet"></i>
            <span>Carteira do Doador</span>
        </div>

        <div class="card">
            <i class="fa-solid fa-users"></i>
            <span>Convide Amigos</span>
        </div>

        <div class="card">
            <i class="fa-solid fa-heart"></i>
            <span>Doação de Órgãos</span>
        </div>

        <div class="card">
            <i class="fa-solid fa-calendar-check"></i>
            <span>Agendamentos</span>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
