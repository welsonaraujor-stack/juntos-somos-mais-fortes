<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Instituição</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <a href="../quem-e-voce/index.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="perfil">

        <div class="avatar">
            <i class="fa-solid fa-building"></i>
        </div>

        <div>
            <h2>INSTITUIÇÃO</h2>
            <span>
                Represento uma empresa,
                escola ou organização
            </span>
        </div>

    </div>

    <div class="banner">

        <i class="fa-solid fa-building"></i>

        <p>
            Promova a solidariedade dentro da
            sua instituição e salve vidas.
        </p>

    </div>

    <h3>DADOS DA INSTITUIÇÃO</h3>

    <div class="campo">
        <i class="fa-solid fa-building"></i>
        <input type="text" placeholder="Razão Social">
    </div>

    <div class="campo">
        <i class="fa-solid fa-tag"></i>
        <input type="text" placeholder="Nome Fantasia">
    </div>

    <div class="campo">
        <i class="fa-solid fa-id-card"></i>
        <input type="text" placeholder="CNPJ">
    </div>

    <div class="campo">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Nome do Responsável">
    </div>

    <div class="campo">
        <i class="fa-solid fa-phone"></i>
        <input type="text" placeholder="Telefone">
    </div>

    <div class="campo">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="E-mail">
    </div>

    <div class="campo">
        <i class="fa-solid fa-location-dot"></i>
        <input type="text" placeholder="Endereço">
    </div>

    <h3>FUNCIONALIDADES</h3>

    <div class="funcionalidades">

        <div class="card">
            <i class="fa-solid fa-users"></i>
            <span>Campanha Corporativa</span>
        </div>

        <div class="card">
            <i class="fa-solid fa-calendar-days"></i>
            <span>Dia da Doação</span>
        </div>

        <div class="card">
            <i class="fa-solid fa-chart-column"></i>
            <span>Relatórios e Indicadores</span>
        </div>

        <div class="card">
            <i class="fa-solid fa-heart-circle-check"></i>
            <span>Impacto Social</span>
        </div>

    </div>

    <button id="btnInstituicao">

        Organizar Campanha

        <i class="fa-solid fa-arrow-right"></i>

    </button>

</div>

<script src="script.js"></script>

</body>
</html>
