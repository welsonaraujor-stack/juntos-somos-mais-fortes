<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="phone">

    <header>
        <a href="../login/index.html" class="voltar">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="header-texto">
            <h1>Pré-Cadastro</h1>
            <p>Vamos começar com algumas informações básicas.</p>
        </div>
    </header>

    <div class="hero">
        <div class="hero-icone">
            <i class="fa-solid fa-user-plus"></i>
        </div>
        <div>
            <strong>Crie sua conta</strong>
            <p>Preencha os dados abaixo para começar a salvar vidas.</p>
        </div>
    </div>

    <div class="formulario">

        <div class="campo">
            <div class="campo-icone">
                <i class="fa-solid fa-user"></i>
            </div>
            <input type="text" id="nome" placeholder="Nome Completo">
        </div>

        <div class="campo">
            <div class="campo-icone">
                <i class="fa-solid fa-id-card"></i>
            </div>
            <input type="text" id="cpf" placeholder="CPF">
        </div>

        <div class="campo">
            <div class="campo-icone">
                <i class="fa-solid fa-calendar-days"></i>
            </div>
            <input type="date" id="nascimento">
        </div>

        <div class="campo">
            <div class="campo-icone">
                <i class="fa-solid fa-phone"></i>
            </div>
            <input type="tel" id="telefone" placeholder="Telefone">
        </div>

        <div class="campo">
            <div class="campo-icone">
                <i class="fa-solid fa-envelope"></i>
            </div>
            <input type="email" id="email" placeholder="E-mail">
        </div>

        <div class="campo">
            <div class="campo-icone">
                <i class="fa-solid fa-location-dot"></i>
            </div>
            <input type="text" id="cidade" placeholder="Cidade">
        </div>

    </div>

    <div class="info-box">
        <i class="fa-solid fa-shield-halved"></i>
        <p>Seus dados são protegidos e usados apenas para a doação de sangue.</p>
    </div>

    <button id="continuar" class="btn-continuar">
        <i class="fa-solid fa-arrow-right"></i>
        Continuar
    </button>

    <p class="login-link">
        Já tem conta?
        <a href="../login/index.html">Fazer login</a>
    </p>

</div>

<script src="script.js"></script>
</body>
</html>
