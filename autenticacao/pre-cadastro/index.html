<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="phone">

    <header>
        <a href="../login/index.html" class="voltar">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="header-texto">
            <h1>Pré-Cadastro</h1>
            <p>Vamos começar com algumas informações básicas.</p>
        </div>
    </header>

    <!-- FOTO -->
    <div class="foto-perfil">
        <label for="foto" class="foto-label">
            <img src="img/avatar-default.png" id="preview" alt="Foto do usuário">
            <div class="editar-foto">
                <i class="fa-solid fa-camera"></i>
            </div>
        </label>
        <input type="file" id="foto" accept="image/*" hidden>
        <h3>Adicionar foto</h3>
        <p>Essa foto aparecerá no seu perfil.</p>
    </div>

    <!-- FORMULÁRIO -->
    <div class="formulario">

        <div class="campo">
            <div class="campo-icone">
                <i class="fa-solid fa-user"></i>
            </div>
            <input type="text" id="nome" placeholder="Nome Completo">
        </div>

        <div class="campo">
            <div class="campo-icone">
                <i class="fa-solid fa-id-card"></i>
            </div>
            <input type="text" id="cpf" placeholder="CPF">
        </div>

        <div class="campo">
            <div class="campo-icone">
                <i class="fa-solid fa-calendar-days"></i>
            </div>
            <input type="date" id="nascimento">
        </div>

        <div class="campo">
            <div class="campo-icone">
                <i class="fa-solid fa-phone"></i>
            </div>
            <input type="tel" id="telefone" placeholder="Telefone">
        </div>

        <div class="campo">
            <div class="campo-icone">
                <i class="fa-solid fa-envelope"></i>
            </div>
            <input type="email" id="email" placeholder="E-mail">
        </div>

        <div class="campo">
            <div class="campo-icone">
                <i class="fa-solid fa-location-dot"></i>
            </div>
            <input type="text" id="cidade" placeholder="Cidade">
        </div>

    </div>

    <!-- INFO -->
    <div class="info-box">
        <i class="fa-solid fa-shield-halved"></i>
        <p>Seus dados são protegidos e usados apenas para a doação de sangue.</p>
    </div>

    <!-- BOTÃO -->
    <button id="continuar" class="btn-continuar">
        <i class="fa-solid fa-arrow-right"></i>
        Continuar
    </button>

    <!-- LOGIN LINK -->
    <p class="login-link">
        Já tem conta?
        <a href="../login/index.html">Fazer login</a>
    </p>

</div><!-- FIM .phone -->

<script src="script.js"></script>
</body>
</html>
