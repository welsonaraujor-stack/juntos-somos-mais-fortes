<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Parceiro</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <a href="../quem-e-voce/index.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="perfil">

        <div class="avatar">
            <i class="fa-solid fa-handshake"></i>
        </div>

        <div>
            <h2>PARCEIRO</h2>
            <span>
                Quero apoiar e fazer parte desta causa
            </span>
        </div>

    </div>

    <div class="banner">

        <i class="fa-solid fa-heart"></i>

        <p>
            Seja um parceiro e fortaleça a rede
            que salva vidas todos os dias.
        </p>

    </div>

    <h3>DADOS DA INSTITUIÇÃO</h3>

    <div class="campo">
        <i class="fa-solid fa-building"></i>
        <input type="text" placeholder="Nome da Instituição">
    </div>

    <div class="campo">
        <i class="fa-solid fa-id-card"></i>
        <input type="text" placeholder="CNPJ">
    </div>

    <div class="campo">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Nome do Responsável">
    </div>

    <div class="campo">
        <i class="fa-solid fa-phone"></i>
        <input type="text" placeholder="Telefone">
    </div>

    <div class="campo">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="E-mail">
    </div>

    <div class="campo">
        <i class="fa-solid fa-location-dot"></i>
        <input type="text" placeholder="Cidade">
    </div>

    <h3>TIPO DE PARCERIA</h3>

    <div class="tipos">

        <label>
            <input type="radio" name="parceria">
            Hospital
        </label>

        <label>
            <input type="radio" name="parceria">
            Hemocentro
        </label>

        <label>
            <input type="radio" name="parceria">
            Patrocinador
        </label>

        <label>
            <input type="radio" name="parceria">
            ONG / Projeto Social
        </label>

    </div>

    <h3>FUNCIONALIDADES</h3>

    <div class="funcionalidades">

        <div class="card">
            <i class="fa-solid fa-bullhorn"></i>
            <span>Divulgar Campanhas</span>
        </div>

        <div class="card">
            <i class="fa-solid fa-hand-holding-heart"></i>
            <span>Disponibilizar Benefícios</span>
        </div>

        <div class="card">
            <i class="fa-solid fa-chart-column"></i>
            <span>Relatórios e Indicadores</span>
        </div>

        <div class="card">
            <i class="fa-solid fa-arrow-trend-up"></i>
            <span>Acompanhar Impacto</span>
        </div>

    </div>

    <button id="btnParceiro">

        Continuar

        <i class="fa-solid fa-arrow-right"></i>

    </button>

</div>

<script src="script.js"></script>

</body>
</html>
