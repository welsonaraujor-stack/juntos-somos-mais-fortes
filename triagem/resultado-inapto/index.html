<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resultado da Pré-Triagem</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="card">

    <div class="icone">

        <i class="fa-solid fa-circle-xmark"></i>

    </div>

    <h1>Não Apto</h1>

    <p class="mensagem">

        Neste momento você não está apto para realizar a doação de sangue.

    </p>

    <div class="motivo">

        <i class="fa-solid fa-circle-info"></i>

        Algumas respostas da pré-triagem indicam que você deve aguardar antes de doar.

    </div>

    <div class="botoes">

        <button
        class="refazer"
        id="btnRefazer">

            Refazer Triagem

        </button>

        <button
        class="inicio"
        id="btnInicio">

            Voltar ao Início

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
