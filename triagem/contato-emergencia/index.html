<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato de Emergência</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="phone">

    <header>
        <a href="#" class="voltar">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="header-texto">
            <h1>Contato de Emergência</h1>
            <p>Essas informações podem ser muito importantes.</p>
        </div>
    </header>

    <div class="hero">
        <div class="hero-icone">
            <i class="fa-solid fa-user-group"></i>
        </div>
        <p>Adicione alguém de confiança para ser contactado em caso de necessidade durante a doação.</p>
    </div>

    <div class="formulario">

        <div class="campo">
            <label>
                <i class="fa-solid fa-user"></i>
                Nome Completo
            </label>
            <input type="text" placeholder="Nome do contato">
        </div>

        <div class="campo">
            <label>
                <i class="fa-solid fa-people-arrows"></i>
                Parentesco
            </label>
            <div class="select-wrapper">
                <select>
                    <option value="">Selecione</option>
                    <option>Pai</option>
                    <option>Mãe</option>
                    <option>Filho(a)</option>
                    <option>Irmão(ã)</option>
                    <option>Cônjuge</option>
                    <option>Amigo(a)</option>
                </select>
                <i class="fa-solid fa-chevron-down select-icone"></i>
            </div>
        </div>

        <div class="campo">
            <label>
                <i class="fa-solid fa-phone"></i>
                Telefone
            </label>
            <div class="input-wrapper">
                <i class="fa-solid fa-phone input-icone"></i>
                <input type="tel" placeholder="(11) 99999-9999">
            </div>
        </div>

        <div class="campo">
            <label>
                <i class="fa-solid fa-phone-flip"></i>
                Segundo Contato
                <span class="opcional">opcional</span>
            </label>
            <div class="input-wrapper">
                <i class="fa-solid fa-phone-flip input-icone"></i>
                <input type="tel" placeholder="(11) 98888-8888">
            </div>
        </div>

    </div>

    <div class="info-box">
        <i class="fa-solid fa-shield-heart"></i>
        <p>Seus dados são protegidos e usados apenas em situações de emergência.</p>
    </div>

    <button class="btn-salvar" onclick="salvarContato()">
        <i class="fa-solid fa-floppy-disk"></i>
        Salvar e Continuar
    </button>

</div>

<script src="script.js"></script>
</body>
</html>
