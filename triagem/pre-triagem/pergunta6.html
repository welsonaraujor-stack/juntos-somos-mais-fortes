<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pré-Triagem</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="card">

    <a href="pergunta5.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="contador">
        6 de 8
    </div>

    <div class="barra">

        <div class="progresso progresso6"></div>

    </div>

    <img
    src="assets/imagens/gravida.PNG"
    class="imagem">

    <h1>

      Está <span>grávida</span>
      ou
      <span>amamentando</span>?
        
    </h1>
    <p>

     Grávidas ou lactantes não podem doar neste momento.

    </p>

    <div class="botoes">

        <button
        class="sim"
        onclick="responderGravidez('sim')">

            ✔ Sim

        </button>

        <button
        class="nao"
        onclick="responderGravidez('nao')">

            ✖ Não

        </button>

    </div>

    <div class="info">

        <i class="fa-solid fa-circle-info"></i>

        Aguarde 3 meses após o parto para doar.

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
