<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Triagem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="phone">

    <div class="topo">
        <a href="../../autenticacao/quem-e-voce/index.html" class="voltar">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="topo-centro">
            <div class="icone">
                <i class="fa-solid fa-clipboard-check"></i>
            </div>
            <div>
                <h2>Pré-triagem</h2>
                <p>Responda as perguntas para verificar se você está apto a doar.</p>
            </div>
        </div>
        <span class="contador">1 de 8</span>
    </div>

    <div class="barra">
        <div class="progresso p1"></div>
    </div>

    <img src="imagens/balanca.PNG" class="imagem" alt="Balança">

    <h1>Você pesa <span>mais de 50kg</span>?</h1>

    <p>O peso mínimo para a doação é de 50kg.</p>

    <div class="botoes">
        <button class="sim" onclick="responder(1, 'sim')">
            ✔ Sim
        </button>
        <button class="nao" onclick="responder(1, 'nao')">
            ✖ Não
        </button>
    </div>

    <div class="info">
        <i class="fa-solid fa-circle-info"></i>
        Essa informação é muito importante para sua segurança.
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
