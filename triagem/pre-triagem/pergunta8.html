<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pré-Triagem</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="card">

    <a href="pergunta7.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="contador">
        8 de 8
    </div>

    <div class="barra">

        <div class="progresso progresso8"></div>

    </div>

    <img
    src="assets/imagens/cirugia.PNG"
    class="imagem">

    <h1>

      Realizou alguma <span>cirurgia</span>
       nos últimos 6 meses?
      
        
    </h1>
    <p>

     Cirurgias recentes exigem um 
     periodo de recuperação.

    </p>

    <div class="botoes">

        <button
        class="sim"
        onclick="responderFinal('sim')">

            ✔ Sim

        </button>

        <button
        class="nao"
        onclick="responderFinal('nao')">

            ✖ Não

        </button>

    </div>

    <div class="info">

        <i class="fa-solid fa-circle-info"></i>

        O prazo pode variar conforme o
        tipo de cirurgia.

    </div>

</div>
<script src="script.js"></script>
</body>
</html>
