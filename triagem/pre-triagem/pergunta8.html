
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Triagem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="phone">

    <div class="topo">
        <a href="quem-e-voce.html" class="voltar">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="topo-centro">
            <div class="icone">
                <i class="fa-solid fa-clipboard-check"></i>
            </div>
        
        </div>
        <span class="contador">8 de 8</span>
    </div>

    <div class="barra">
        <div class="progresso p8"></div>
    </div>

    <img src="imagens/cirugia.PNG" class="imagem" alt="Balança">

        <h1>

      Realizou alguma <span>cirurgia</span>
       nos últimos 6 meses?
      
        
    </h1>
    <p>

     Cirurgias recentes exigem um 
     periodo de recuperação.

    </p>
    <div class="botoes">
        <button class="sim" onclick="responder(1, 'sim')">
            ✔ Sim
        </button>
        <button class="nao" onclick="responder(1, 'nao')">
            ✖ Não
        </button>
    </div>

    <div class="info">
        <i class="fa-solid fa-circle-info"></i>
        O prazo pode variar conforme o
        tipo de cirurgia.
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
