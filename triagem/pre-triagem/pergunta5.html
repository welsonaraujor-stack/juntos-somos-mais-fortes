<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pré-Triagem</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="card">

    <a href="pergunta4.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="contador">
        5 de 8
    </div>

    <div class="barra">

        <div class="progresso progresso5"></div>

    </div>

    <img
    src="assets/imagens/tatoo.PNG"
    class="imagem">

    <h1>

      Fez <span>tatuagem</span>
       nos últimos
      <span>12 meses?</span> 
      
        
    </h1>
    <p>

     Tatuagens recentes podem oferecer
     
     riscos de infecções.

    </p>

    <div class="botoes">

        <button
        class="sim"
        onclick="responderTatuagem('sim')">

            ✔ Sim

        </button>

        <button
        class="nao"
        onclick="responderTatuagem('nao')">

            ✖ Não

        </button>

    </div>

    <div class="info">

        <i class="fa-solid fa-circle-info"></i>

        Após 12 meses da tatuagem você pode doar normalmente.

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
