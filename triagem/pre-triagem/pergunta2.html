
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Triagem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="phone">

    <div class="topo">
        <a href="pergunta1.html" class="voltar">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="topo-centro">
            <div class="icone">
                <i class="fa-solid fa-clipboard-check"></i>
            </div>
        
        </div>
        <span class="contador">2 de 8</span>
    </div>

    <div class="barra">
        <div class="progresso p2"></div>
    </div>

    <img src="imagens/idade.PNG" class="imagem" alt="Balança">

     <h1>

        Você tem entre

        <span>16</span> e <span>69 anos</span>?

    </h1>

    <p>

        A doação é permitida para pessoas
        entre 16 e 69 anos.

    </p>

    <div class="botoes">
        <button class="sim" onclick="responder(2, 'sim')">
            ✔ Sim
        </button>
        <button class="nao" onclick="responder(2, 'nao')">
            ✖ Não
        </button>
    </div>

    <div class="info">
        <i class="fa-solid fa-circle-info"></i>
        Menores de 18 anos precisam de
        autorização do responsável.
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
