<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benefícios</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="phone">

    <header>
        <div class="perfil">
            <img src="https://i.pravatar.cc/150?img=12" id="fotoPerfil">
        </div>
        <div class="notificacao">
            <i class="fa-regular fa-bell"></i>
            <span></span>
        </div>
    </header>

    <section class="titulo">
        <h1><i class="fa-solid fa-gift"></i>Reconhecimento </h1>
        <p>Empresas parceiras reconhecem quem ajuda a salvar vidas.</p>
    </section>

    <section class="banner">
        <div class="gift">🎁</div>
        <div>
            <h2>Você escolheu salvar vidas.

            A comunidade faz questão de agradecer esse gesto..</h2>
        </div>
    </section>

    <section class="categorias">
        <button class="categoria ativa" data-cat="todos">
            <i class="fa-solid fa-bullseye"></i>
            <span>Todos</span>
        </button>
        <button class="categoria" data-cat="saude">
            <i class="fa-solid fa-heart-pulse"></i>
            <span>Saúde</span>
        </button>
        <button class="categoria" data-cat="educacao">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>Educação</span>
        </button>
        <button class="categoria" data-cat="cultura">
            <i class="fa-solid fa-masks-theater"></i>
            <span>Cultura</span>
        </button>
        <button class="categoria" data-cat="servicos">
            <i class="fa-solid fa-gear"></i>
            <span>Serviços</span>
        </button>
        <button class="categoria" data-cat="alimentacao">
            <i class="fa-solid fa-utensils"></i>
            <span>Alimentação</span>
        </button>
    </section>

    <!-- TÍTULO DA LISTA -->
    <p class="beneficios-titulo">❤️ Empresas que agradecem sua doação</p>

    <!-- LISTA GERADA PELO JS -->
    <section class="beneficios" id="listaBeneficios">
    </section>

    <!-- BOTÃO VER TODAS -->
    <button id="btnVerTodas" style="display:none">
        Ver todos os benefícios →
    </button>

    <nav>
        <button onclick="inicio()">
            <i class="fa-solid fa-house"></i>
            <span>Início</span>
        </button>
        <button>
            <i class="fa-regular fa-calendar-days"></i>
            <span>Agendar</span>
        </button>
        <button>
            <i class="fa-solid fa-droplet"></i>
            <span>Doações</span>
        </button>
        <button>
            <i class="fa-solid fa-trophy"></i>
            <span>Impacto</span>
        </button>
        <button class="ativo">
            <i class="fa-solid fa-gift"></i>
            <span>Gratidão</span>
        </button>
        
    </nav>

</div>

<script src="script.js"></script>
</body>
</html>
