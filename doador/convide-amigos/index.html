<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convide Amigos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="phone">

    <header>
        <a href="#" class="voltar">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="header-texto">
            <h1>Convide amigos</h1>
            <p>Ajude a salvar ainda mais vidas!</p>
        </div>
    </header>

    <section class="hero">
        <div class="hero-icones">
            <div class="avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="avatar destaque">
                <i class="fa-solid fa-heart"></i>
            </div>
            <div class="avatar">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
        <h2>Indique seus amigos</h2>
        <p>Cada amigo convidado amplia a rede de doadores e ajuda a salvar mais vidas.</p>
    </section>

    <section class="codigo-section">
        <small>Seu código de indicação</small>
        <div class="codigo">
            <span id="codigo">JUNTOS2026</span>
            <button onclick="copiarCodigo()" class="btn-copiar">
                <i class="fa-regular fa-copy"></i>
                Copiar
            </button>
        </div>
    </section>

    <button class="btn-compartilhar" onclick="compartilhar()">
        <i class="fa-solid fa-share-nodes"></i>
        Compartilhar convite
    </button>

    <section class="redes">
        <div class="rede-item">
            <div class="rede-icone whatsapp">
                <i class="fa-brands fa-whatsapp"></i>
            </div>
            <span>WhatsApp</span>
        </div>
        <div class="rede-item">
            <div class="rede-icone instagram">
                <i class="fa-brands fa-instagram"></i>
            </div>
            <span>Instagram</span>
        </div>
        <div class="rede-item">
            <div class="rede-icone facebook">
                <i class="fa-brands fa-facebook"></i>
            </div>
            <span>Facebook</span>
        </div>
        <div class="rede-item">
            <div class="rede-icone mais">
                <i class="fa-solid fa-ellipsis"></i>
            </div>
            <span>Mais</span>
        </div>
    </section>

    <section class="info-box">
        <div class="info-icone">
            <i class="fa-solid fa-droplet"></i>
        </div>
        <div>
            <strong>Cada novo doador pode salvar até 4 vidas.</strong>
            <p>Quanto mais amigos, maior o impacto.</p>
        </div>
    </section>

    <nav>
        <button>
            <i class="fa-solid fa-house"></i>
            <span>Início</span>
        </button>
        <button>
            <i class="fa-regular fa-calendar-days"></i>
            <span>Agendar</span>
        </button>
        <button>
            <i class="fa-solid fa-droplet"></i>
            <span>Doações</span>
        </button>
        <button>
            <i class="fa-solid fa-trophy"></i>
            <span>impacto</span>
        </button>
        <button>
            <i class="fa-solid fa-gift"></i>
            <span>Benefícios</span>
        </button>
        
    </nav>

</div>

<script src="script.js"></script>
</body>
</html>
