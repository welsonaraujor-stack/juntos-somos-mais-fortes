<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carteira do Doador</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="perfil">

        <img src="https://i.pravatar.cc/150?img=12">

        <div class="dados">

            <h2>João da Silva</h2>

            <p>Doador desde 2026</p>

        </div>

        <i class="fa-solid fa-circle-check check"></i>

    </div>

    <div class="card">

        <div class="tipo">

            <h3>Tipo Sanguíneo</h3>

            <div class="sangue">

                <span>O+</span>

                <i class="fa-solid fa-droplet"></i>

            </div>

        </div>

        <div class="datas">

            <div>

                <small>Última doação</small>

                <strong>05/06/2026</strong>

            </div>

            <div>

                <small>Próxima doação possível</small>

                <strong>05/09/2026</strong>

            </div>

        </div>

        <button class="historico">

            Ver histórico completo

            <i class="fa-solid fa-chevron-right"></i>

        </button>

    </div>

    <div class="atalhos">

        <div class="box">
            <i class="fa-solid fa-medal"></i>
            <span>Conquistas</span>
        </div>

        <div class="box">
            <i class="fa-solid fa-file-lines"></i>
            <span>Certificados</span>
        </div>

        <div class="box">
            <i class="fa-solid fa-award"></i>
            <span>Impacto</span>
        </div>

        <div class="box">
            <i class="fa-solid fa-gift"></i>
            <span>Benefícios</span>
        </div>

    </div>

    <div class="menu">

        <div>
            <i class="fa-solid fa-house"></i>
            <span>Início</span>
        </div>

        <div>
            <i class="fa-regular fa-calendar"></i>
            <span>Agendar</span>
        </div>

        <div class="ativo">
            <i class="fa-solid fa-heart"></i>
            <span>Doações</span>
        </div>

        <div>
            <i class="fa-solid fa-gift"></i>
            <span>Benefícios</span>
        </div>

        <div>
            <i class="fa-regular fa-user"></i>
            <span>Perfil</span>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
