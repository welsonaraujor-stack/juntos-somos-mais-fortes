<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seu Impacto</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <h2>Seu impacto</h2>

    <div class="icone-coracao">

        <i class="fa-solid fa-heart"></i>

    </div>

    <h3>Sua jornada faz a diferença!</h3>

    <div class="card-info">

        <div class="icone">

            <i class="fa-solid fa-droplet"></i>

        </div>

        <div>

            <strong>5</strong>

            <p>Doações realizadas</p>

        </div>

    </div>

    <div class="card-info">

        <div class="icone">

            <i class="fa-regular fa-calendar-plus"></i>

        </div>

        <div>

            <strong>Até 20</strong>

            <p>Vidas impactadas</p>

        </div>

    </div>

    <div class="card-info">

        <div class="icone">

            <i class="fa-solid fa-droplet"></i>

        </div>

        <div>

            <strong>1.600 ml</strong>

            <p>De sangue doado</p>

        </div>

    </div>

    <div class="mensagem">

        <i class="fa-regular fa-heart"></i>

        <span>
            Cada bolsa de sangue pode
            salvar até 4 vidas.
        </span>

    </div>

    <div class="menu">

        <div>
            <i class="fa-solid fa-house"></i>
            <span>Início</span>
        </div>

        <div>
            <i class="fa-regular fa-calendar"></i>
            <span>Agendar</span>
        </div>

        <div class="ativo">
            <i class="fa-solid fa-heart"></i>
            <span>Impacto</span>
        </div>

        <div>
            <i class="fa-solid fa-gift"></i>
            <span>Benefícios</span>
        </div>

        <div>
            <i class="fa-regular fa-user"></i>
            <span>Perfil</span>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
