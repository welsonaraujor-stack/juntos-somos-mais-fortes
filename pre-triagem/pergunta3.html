<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pré-Triagem</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="card">

    <a href="pergunta2.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="contador">
        3 de 8
    </div>

    <div class="barra">

        <div class="progresso progresso3"></div>

    </div>

    <img
    src="imagens/sono.PNG"
    class="imagem">

    <h1>
         Dormiu pelo menos
        <span>6 horas</span>
         nas últimas
        <span>24 horas</span>?
       
        
    </h1>
    <p>

       Uma boa noite de sono é importante
       
       para sua saúde e para a doação.
    </p>

    <div class="botoes">

        <button
        class="sim"
        onclick="window.location.href='pergunta4.html'">

            ✔ Sim

        </button>

        <button
        class="nao"
        onclick="window.location.href='resultado.html'">

            ✖ Não

        </button>

    </div>

    <div class="info">

        <i class="fa-solid fa-circle-info"></i>

        Evite doar em caso de cansaço excessivo.

    </div>

</div>

</body>
</html>
