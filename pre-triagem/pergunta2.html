<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pré-Triagem</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="card">

    <a href="pergunta1.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="contador">
        2 de 8
    </div>

    <div class="barra">

        <div class="progresso progresso2"></div>

    </div>

    <img
    src="imagens/idade.png"
    class="imagem">

    <h1>

        Você tem entre

        <span>16</span> e <span>69 anos</span>?

    </h1>

    <p>

        A doação é permitida para pessoas
        entre 16 e 69 anos.

    </p>

    <div class="botoes">

        <button
        class="sim"
        onclick="window.location.href='pergunta3.html'">

            ✔ Sim

        </button>

        <button
        class="nao"
        onclick="window.location.href='resultado.html'">

            ✖ Não

        </button>

    </div>

    <div class="info">

        <i class="fa-solid fa-circle-info"></i>

        Menores de 18 anos precisam de
        autorização do responsável.

    </div>

</div>

</body>
</html>
