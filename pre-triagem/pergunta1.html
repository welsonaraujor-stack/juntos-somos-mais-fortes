<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pré-Triagem</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="card">

     <div class="topo">

        <div class="icone">

            <i class="fa-solid fa-clipboard-check"></i>

        </div>

        <div>

            <h2>Pré-triagem</h2>

            <p>
                Responda as perguntas para
                verificar se você está apto a doar.
            </p>

        </div>

    </div>
    

    <div class="barra">

        <div class="progresso progresso1"></div>

    </div>

    <img
    src="imagens/balanca.PNG"
    class="imagem">

    <h1>

        Você pesa

        <span>mais de 50kg</span>?

    </h1>

    <p>

        O peso mínimo para a doação
              é de 50kg.

    </p>

    <div class="botoes">

        <button
        class="sim"
        onclick="window.location.href='pergunta2.html'">

            ✔ Sim

        </button>

        <button
        class="nao"
        onclick="window.location.href='resultado.html'">

            ✖ Não

        </button>

    </div>

    <div class="info">

        <i class="fa-solid fa-circle-info"></i>

        Essa informação é muito 
        importante para sua segurança.

    </div>

</div>

</body>
</html>
