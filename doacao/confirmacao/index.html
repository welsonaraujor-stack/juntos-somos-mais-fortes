<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Confirmado</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="phone">

    <!-- TOPO COM FOTO -->
    <div class="topo">
        <div class="foto-wrapper">
            <img src="https://i.pravatar.cc/150?img=12" alt="Foto do doador">
            <div class="foto-badge">
                <i class="fa-solid fa-check"></i>
            </div>
        </div>
        <h2>João da Silva</h2>
        <p class="subtitulo">Doador confirmado</p>
    </div>

    <!-- BANNER CONFIRMADO -->
    <div class="banner-sucesso">
        <div class="sucesso-icone">
            <i class="fa-solid fa-calendar-check"></i>
        </div>
        <div>
            <strong>Agendamento Confirmado!</strong>
            <p>Sua doação foi agendada com sucesso.</p>
        </div>
    </div>

    <!-- DETALHES -->
    <div class="detalhes">

        <div class="detalhe-item">
            <div class="detalhe-icone">
                <i class="fa-solid fa-location-dot"></i>
            </div>
            <div class="detalhe-info">
                <small>Local</small>
                <strong id="unidadeEscolhida">Parque Ibirapuera</strong>
            </div>
        </div>

        <div class="divisor"></div>

        <div class="detalhe-item">
            <div class="detalhe-icone azul">
                <i class="fa-solid fa-calendar-days"></i>
            </div>
            <div class="detalhe-info">
                <small>Data</small>
                <strong id="dataEscolhida">10/06/2026</strong>
            </div>
        </div>

        <div class="divisor"></div>

        <div class="detalhe-item">
            <div class="detalhe-icone verde">
                <i class="fa-solid fa-clock"></i>
            </div>
            <div class="detalhe-info">
                <small>Horário</small>
                <strong id="horarioEscolhido">08:00</strong>
            </div>
        </div>

    </div>

    <!-- QR CODE -->
    <div class="qr-section">
        <p class="qr-label">
            <i class="fa-solid fa-qrcode"></i>
            Apresente este QR Code na chegada
        </p>
        <div class="qr-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=JUNTOS-SOMOS-MAIS-FORTES">
        </div>
        <small>Código: JUNTOS-2026-0001</small>
    </div>

    <!-- BOTÕES -->
    <div class="botoes">
        <button class="btn-primario" onclick="adicionarAgenda()">
            <i class="fa-solid fa-calendar-plus"></i>
            Adicionar à Agenda
        </button>
        <button class="btn-secundario" onclick="voltarInicio()">
            <i class="fa-solid fa-house"></i>
            Voltar ao Início
        </button>
    </div>

    <!-- INFO FINAL -->
    <div class="info-box">
        <i class="fa-solid fa-circle-info"></i>
        <p>Chegue com 15 minutos de antecedência e traga um documento com foto.</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
