<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendamento</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <a href="../../doacao/mapa-unidades/index.html" class="voltar">

        <i class="fa-solid fa-arrow-left"></i>

    </a>

    <h1>

        Escolha o melhor<br>
        horário para você

    </h1>

    <div class="local">

        <img src="https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?w=400">

        <div>

            <h3>Parque Ibirapuera</h3>

            <p>Av. Pedro Álvares Cabral</p>

            <strong>10/06/2026 - 08h às 17h</strong>

        </div>

    </div>
    <h2>Escolha uma data</h2>

    <input
    type="date"
    id="data"
    class="campo-data">

    <h2>Horários disponíveis</h2>

    <div class="horarios">

        <button class="ativo">08:00</button>

        <button>09:00</button>

        <button>10:00</button>

        <button>11:00</button>

        <button>13:00</button>

        <button>14:00</button>

        <button>15:00</button>

        <button>16:00</button>

    </div>

    <button
    class="confirmar"
    onclick="confirmarAgendamento()">

        Confirmar Agendamento

    </button>

    <div class="aviso">

        <i class="fa-regular fa-clock"></i>

        Chegue com 15 min de antecedência.

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
