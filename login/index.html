<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Juntos Somos Mais Fortes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="phone">

        <div class="card">

            <img src="img/logooo.png" alt="Logo" class="logo">

            <p class="slogan">
                Uma doação pode<br>
                salvar muitas vidas.
            </p>

            <div class="campo">

                <label>E-mail ou CPF</label>
                <i class="fa-solid fa-user"></i> 
                <input
                    type="text"
                    id="email"
                    placeholder="Digite seu e-mail ou CPF">
                
            </div>

            <div class="campo">

                <label>Senha</label>

                <div class="senha-box">
                    <i class="fa-solid fa-lock"></i>
                    <input
                        type="password"
                        id="senha"
                        placeholder="Digite sua senha">

                    <span id="olho">👁️</span>

                </div>

            </div>

            <a href="#" class="esqueceu">
                Esqueceu sua senha?
            </a>

            <button id="entrar">
                Entrar
            </button>

            <p class="cadastro">
                Não tem uma conta?
                <a href="#">Cadastre-se</a>
            </p>

            <button class="google">
                Entrar com Google
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
