<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unidades Próximas</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <h1>
        Encontre uma<br>
        unidade perto de você
    </h1>

    <div class="cidade">

        <i class="fa-solid fa-location-dot"></i>

        São Paulo - SP

        <button class="filtro">

            <i class="fa-solid fa-sliders"></i>

        </button>

    </div>

    <div class="mapa">

        <img
        src="https://images.unsplash.com/photo-1524661135-423995f22d0b?w=1200"
        alt="Mapa">

    </div>

    <div class="card-unidade">

        <img
        src="https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?w=500">

        <div>

            <h3>Parque Ibirapuera</h3>

            <p>Av. Pedro Álvares Cabral</p>

            <p>10/06 - 08h às 17h</p>

            <span>15 vagas disponíveis</span>

        </div>

    </div>

    <div class="card-unidade">

        <img
        src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=500">

        <div>

            <h3>Shopping Tatuapé</h3>

            <p>Rua Domingos Agostim</p>

            <p>11/06 - 09h às 16h</p>

            <span>20 vagas disponíveis</span>

        </div>

    </div>

    <div class="menu">

        <div onclick="inicio()">
            <i class="fa-solid fa-house"></i>
            <span>Início</span>
        </div>

        <div onclick="agendar()">
            <i class="fa-regular fa-calendar"></i>
            <span>Agendar</span>
        </div>

        <div>
            <i class="fa-solid fa-droplet"></i>
            <span>Doações</span>
        </div>

        <div>
            <i class="fa-solid fa-heart"></i>
            <span>Benefícios</span>
        </div>

        <div>
            <i class="fa-regular fa-user"></i>
            <span>Perfil</span>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
